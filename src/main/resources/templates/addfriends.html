<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GacoSplit - Tambah Teman</title>
</head>
<body>
    <!--
        Halaman tambah teman.
        Dirender oleh PageController.addFriends() → return "addfriends"
        URL: /tambah-teman
    -->
    <h1>Tambah Teman</h1>
    <p>Masukkan nama teman-teman yang ikut split bill.</p>

    <form>
        <label for="nama">Nama Teman:</label>
        <input type="text" id="nama" name="nama" placeholder="Masukkan nama">
        <button type="submit">Tambah</button>
    </form>

    <h2>Daftar Teman</h2>
    <ul>
        <li>Ifan</li>
        <li>Rudi</li>
        <li>Fajar</li>
        <li>Toni</li>
    </ul>

    <br>
    <a href="/order-input">Lanjut ke Input Pesanan</a>
    <br>
    <a href="/">Kembali ke Beranda</a>
</body>
</html>
