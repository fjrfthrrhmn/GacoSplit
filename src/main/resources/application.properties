spring.application.name=GacoSplit

# -----------------------------------------------------------
# Konfigurasi Thymeleaf (template engine)
# -----------------------------------------------------------
# prefix: lokasi folder file HTML (default: classpath:/templates/)
# suffix: ekstensi file HTML (default: .html)
# Dengan konfigurasi ini, return "index" akan memuat
# src/main/resources/templates/index.html
# -----------------------------------------------------------
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Mode cache false agar perubahan HTML langsung terlihat saat development
spring.thymeleaf.cache=false

# -----------------------------------------------------------
# Konfigurasi Database (H2 in-memory untuk development)
# -----------------------------------------------------------
# Mode in-memory: data hilang saat aplikasi dimatikan

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Cocok untuk development - tidak perlu instalasi database
spring.datasource.url=jdbc:h2:mem:gacosplit

# Driver H2 (akan otomatis terdeteksi, tapi kita tulis eksplisit)
spring.datasource.driver-class-name=org.h2.Driver

# Username & password database
spring.datasource.username=sa
spring.datasource.password=

# Dialect Hibernate untuk H2 database
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Strategi DDL auto: create-drop
# create-drop = buat table saat startup, hapus saat shutdown
# Cocok untuk development; di production pakai "update" atau "validate"
spring.jpa.hibernate.ddl-auto=create-drop

# Menampilkan query SQL yang dijalankan Hibernate (untuk belajar)
spring.jpa.show-sql=true

spring.h2.console.settings.web-allow-others=true

# Format SQL biar lebih raja di console
spring.jpa.properties.hibernate.format_sql=true
