<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GacoSplit - Add Friends</title>
<!-- Google Fonts: Plus Jakarta Sans & Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-secondary": "#ffffff",
                      "surface-container": "#eeeeee",
                      "tertiary": "#006a1b",
                      "tertiary-container": "#1c852c",
                      "on-surface": "#1a1c1c",
                      "on-secondary-container": "#5d1900",
                      "on-primary-fixed-variant": "#93000d",
                      "surface-container-high": "#e8e8e8",
                      "secondary-fixed-dim": "#ffb59d",
                      "on-primary-fixed": "#410002",
                      "on-primary": "#ffffff",
                      "on-background": "#1a1c1c",
                      "tertiary-fixed": "#94f990",
                      "tertiary-fixed-dim": "#78dc77",
                      "secondary": "#ab3500",
                      "surface-variant": "#e2e2e2",
                      "on-tertiary-fixed": "#002204",
                      "primary-fixed-dim": "#ffb4ac",
                      "on-secondary-fixed-variant": "#832600",
                      "primary-container": "#e31b23",
                      "on-tertiary-container": "#f0ffe9",
                      "inverse-surface": "#2f3131",
                      "on-error-container": "#93000a",
                      "inverse-primary": "#ffb4ac",
                      "surface-dim": "#dadada",
                      "inverse-on-surface": "#f1f1f1",
                      "surface-container-lowest": "#ffffff",
                      "on-error": "#ffffff",
                      "secondary-container": "#fe6a34",
                      "surface-tint": "#c00015",
                      "surface": "#f9f9f9",
                      "on-tertiary-fixed-variant": "#005313",
                      "surface-container-low": "#f3f3f3",
                      "error": "#ba1a1a",
                      "surface-bright": "#f9f9f9",
                      "on-secondary-fixed": "#390c00",
                      "primary": "#b90014",
                      "on-tertiary": "#ffffff",
                      "secondary-fixed": "#ffdbd0",
                      "error-container": "#ffdad6",
                      "on-surface-variant": "#5d3f3c",
                      "primary-fixed": "#ffdad6",
                      "background": "#f9f9f9",
                      "outline-variant": "#e7bdb8",
                      "on-primary-container": "#fff9f8",
                      "surface-container-highest": "#e2e2e2",
                      "outline": "#926e6b"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "md": "16px",
                      "container-padding": "20px",
                      "sm": "8px",
                      "xs": "4px",
                      "gutter": "16px",
                      "lg": "24px",
                      "xl": "32px",
                      "base": "8px"
              },
              "fontFamily": {
                      "display-lg": ["Plus Jakarta Sans"],
                      "body-md": ["Inter"],
                      "body-lg": ["Inter"],
                      "label-md": ["Plus Jakarta Sans"],
                      "headline-lg": ["Plus Jakarta Sans"],
                      "headline-md": ["Plus Jakarta Sans"],
                      "headline-lg-mobile": ["Plus Jakarta Sans"],
                      "label-sm": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "display-lg": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                      "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                      "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                      "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "600" }],
                      "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                      "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                      "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                      "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }]
              }
            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e2e2;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-surface-container-high flex items-center justify-center min-h-screen font-body-md antialiased selection:bg-primary selection:text-on-primary">
<!-- Mobile Device Simulator Container -->
<div class="w-[390px] h-[844px] bg-surface relative overflow-hidden flex flex-col shadow-2xl rounded-[40px] ring-8 ring-surface-container-lowest">
<!-- TopAppBar (from JSON) -->
<header class="bg-surface/80 backdrop-blur-md sticky top-0 full-width z-50 border-b border-surface-container shadow-sm flex justify-between items-center w-full px-container-padding py-md">
<div class="font-display-lg text-headline-md font-extrabold text-primary">
                GacoSplit
            </div>
<div class="flex gap-sm items-center">
<button class="font-label-md text-label-md text-on-surface-variant hover:bg-primary-container/10 px-sm py-xs rounded-lg transition-colors active:scale-95 duration-150">
                    Bantuan
                </button>
<button class="font-label-md text-label-md text-primary font-bold hover:bg-primary-container/10 px-sm py-xs rounded-lg transition-colors active:scale-95 duration-150">
                    Reset
                </button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto px-container-padding py-lg flex flex-col gap-lg">
<!-- Section Header -->
<div class="flex flex-col gap-xs">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">
                    Siapa aja yang makan?
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Tambahkan teman yang ikut patungan hari ini.
                </p>
</div>
<!-- Input Card (Bento style) -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] p-md flex flex-col gap-sm border border-surface-container-low">
<label class="font-label-md text-label-md text-on-surface" for="friendName">Nama Teman</label>
<div class="flex gap-sm">
<input class="flex-1 bg-surface-container-low border-surface-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary transition-colors outline-none" id="friendName" placeholder="Masukkan nama teman" type="text"/>
<button class="bg-secondary-container text-on-secondary-container font-label-md text-label-md px-lg rounded-lg shadow-sm hover:opacity-90 active:scale-95 transition-all flex items-center justify-center">
                        Tambah
                    </button>
</div>
</div>
<!-- Friends List -->
<div class="flex flex-col gap-sm">
<div class="flex justify-between items-center mb-xs">
<span class="font-label-md text-label-md text-on-surface-variant">Daftar Teman (4)</span>
</div>
<!-- Friend Chip 1 -->
<div class="flex items-center justify-between bg-surface-container-lowest rounded-xl p-sm pr-md shadow-[0_4px_15px_rgba(0,0,0,0.03)] border border-surface-container-low group transition-all hover:border-surface-variant">
<div class="flex items-center gap-md">
<div class="w-[40px] h-[40px] rounded-full bg-primary-fixed flex items-center justify-center font-headline-md text-headline-md text-on-primary-fixed">
                            I
                        </div>
<span class="font-label-md text-label-md text-on-surface">Ifan</span>
</div>
<button aria-label="Remove Ifan" class="text-outline hover:text-error transition-colors p-xs active:scale-90">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Friend Chip 2 -->
<div class="flex items-center justify-between bg-surface-container-lowest rounded-xl p-sm pr-md shadow-[0_4px_15px_rgba(0,0,0,0.03)] border border-surface-container-low group transition-all hover:border-surface-variant">
<div class="flex items-center gap-md">
<div class="w-[40px] h-[40px] rounded-full bg-tertiary-fixed flex items-center justify-center font-headline-md text-headline-md text-on-tertiary-fixed">
                            R
                        </div>
<span class="font-label-md text-label-md text-on-surface">Rudi</span>
</div>
<button aria-label="Remove Rudi" class="text-outline hover:text-error transition-colors p-xs active:scale-90">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Friend Chip 3 -->
<div class="flex items-center justify-between bg-surface-container-lowest rounded-xl p-sm pr-md shadow-[0_4px_15px_rgba(0,0,0,0.03)] border border-surface-container-low group transition-all hover:border-surface-variant">
<div class="flex items-center gap-md">
<div class="w-[40px] h-[40px] rounded-full bg-secondary-fixed flex items-center justify-center font-headline-md text-headline-md text-on-secondary-fixed">
                            F
                        </div>
<span class="font-label-md text-label-md text-on-surface">Fajar</span>
</div>
<button aria-label="Remove Fajar" class="text-outline hover:text-error transition-colors p-xs active:scale-90">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Friend Chip 4 -->
<div class="flex items-center justify-between bg-surface-container-lowest rounded-xl p-sm pr-md shadow-[0_4px_15px_rgba(0,0,0,0.03)] border border-surface-container-low group transition-all hover:border-surface-variant">
<div class="flex items-center gap-md">
<div class="w-[40px] h-[40px] rounded-full bg-surface-variant flex items-center justify-center font-headline-md text-headline-md text-on-surface-variant">
                            T
                        </div>
<span class="font-label-md text-label-md text-on-surface">Toni</span>
</div>
<button aria-label="Remove Toni" class="text-outline hover:text-error transition-colors p-xs active:scale-90">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
</div>
<!-- Spacer to ensure content isn't hidden behind sticky footer -->
<div class="h-lg"></div>
</main>
<!-- Sticky Footer Action -->
<div class="bg-surface/90 backdrop-blur-md px-container-padding py-md pb-[32px] border-t border-surface-container shadow-[0_-10px_30px_rgba(0,0,0,0.05)] z-40">
<button class="w-full bg-primary text-on-primary py-[16px] rounded-xl font-label-md text-label-md flex justify-center items-center gap-sm active:scale-[0.98] transition-transform shadow-sm">
<span>Lanjut Pilih Menu</span>
<span class="material-symbols-outlined text-[20px]" data-weight="fill" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</div>
</div>
</body></html>
